// 语言切换核心逻辑
function switchLang(lang) {
    const data = i18n[lang];
    if (!data) return;

    // 1. 修改 HTML 的 lang 属性
    document.getElementById('html-tag').setAttribute('lang', data.langTag);

    // 2. 更新基础文本
    document.getElementById('main-title').innerText = data.mainTitle;
    document.getElementById('party-info').innerText = data.partyInfo;
    
    // 官方通报板块
    const noticeBox = document.getElementById('notice-box');
    noticeBox.setAttribute('data-label', data.label); // 更新伪元素文字
    document.getElementById('notice-title').innerText = data.noticeTitle;
    document.getElementById('notice-to').innerText = data.noticeTo;
    document.getElementById('notice-p1').innerHTML = data.noticeP1;
    document.getElementById('notice-p2').innerHTML = data.noticeP2;
    document.getElementById('notice-p3').innerHTML = data.noticeP3;
    document.getElementById('notice-footer').innerHTML = data.noticeFooter;

    // 标题更新
    document.getElementById('section-hero').innerText = data.sectionHero;
    document.getElementById('section-whereami').innerText = data.sectionWhereAmI;
    document.getElementById('img1-desc').innerText = data.img1Desc;
    document.getElementById('section-audio').innerText = data.sectionAudio;
    document.getElementById('audio-title').innerText = data.audioTitle;
    document.getElementById('audio-link').innerText = data.audioLink;

    // 3. 动态渲染时间轴
    const timelineList = document.getElementById('timeline-list');
    timelineList.innerHTML = ''; // 清空原有内容

    data.timeline.forEach(item => {
        const li = document.createElement('li');
        
        // 日期
        const spanDate = document.createElement('span');
        spanDate.className = 'date';
        spanDate.innerText = item.date;
        li.appendChild(spanDate);

        // 正文
        const pText = document.createElement('p');
        pText.innerHTML = item.text;
        li.appendChild(pText);

        // 如果存在特殊的子标题（如coser贴）
        if (item.subTitle) {
            const h2Sub = document.createElement('h2');
            h2Sub.innerText = item.subTitle;
            li.appendChild(h2Sub);
        }

        // 如果包含证据图片板块
        if (item.img) {
            const imgSec = document.createElement('div');
            imgSec.className = 'image-section';
            
            const img = document.createElement('img');
            img.src = item.img;
            img.alt = "Evidence";
            img.className = "evidence-img";
            
            const pDesc = document.createElement('p');
            pDesc.style = "font-size: 12px; color: #888; margin-top: 10px;";
            pDesc.innerText = item.imgDesc;
            
            imgSec.appendChild(img);
            imgSec.appendChild(pDesc);
            li.appendChild(imgSec);
        }

        timelineList.appendChild(li);
    });

    // 4. 更新按钮高亮样式
    const buttons = document.querySelectorAll('.lang-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    
    // 根据传入的语言点亮对应的按钮
    const btnIndex = { 'zh': 0, 'en': 1, 'la': 2, 'ja': 3, 'de': 4 };
    buttons[btnIndex[lang]].classList.add('active');
}

// 页面加载时默认初始化中文
window.onload = function() {
    switchLang('zh');
};
